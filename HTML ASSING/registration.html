<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>student registration</title>
    <link rel="stylesheet" href="Risper/css/style.css">

</head>
<body>
    
    <div class="container">
        <div class="heading-form">
            <h1>
                Student Registration Form
            </h1>

        </div>
        <form action="">
               
            <table>
                <tr>
                    <td>
                        <span class="label">
                            name
                        </span>
                    </td>
                    <input type="text" placeholder="Enter full name">
                </tr>
                <tr>
                    <td>
                        <span class="label">
                         Father's Name
                        </span>
                        <input type="text">
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">
                            Mother's Name
                        </span>
                        <input type="text">
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">
                            phone number
                        </span>
                        <input type="text" place holder="017*********">
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">
                            Email

                        </span>
                        <input type="email" placeholder="sample@example.com">
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">
                           Gender
                        </span>
                    </td>
                    <input type="radio" name="gender">Male
                                        <input type="radio" name="gender">Female
                                                            <input type="radio" name="gender">Other
                </tr>
                <tr>
                    <td>
                        <span class="label"> 
                            Date Of Birth
                        </span>
                        <input type="text" class="dob">
                     <input type="text" class="dob">
                      <input type="text" class="dob">dd-mm-yyyy
                    </td>
                    
                </tr>
                <tr>
                    <td>
                        <span class="labbel">
                            Adress
                        </span>
                    </td>
                    <td>
                        <input type="text" placeholder="street-house -road">
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">Blood group</span>
                    </td>
                    <td>
                        <select>
                            <option>select</option>
                            <option>AB+</option>
                            <option>O+</option>
                            <option>B+</option>
                            <option>A+</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">
                            Department
                        </span>
                    </td>
                    <td>
                        <input type="radio" name="department">CSE
                        <input type="radio" name="department">EEE
                        <input type="radio" name="department">BBA
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">
                            course

                        </span>
                    </td>
                    <td>
                        <input type="checkbox">C
                        <input type="checkbox">C++
                        <input type="checkbox">Java
                        <input type="checkbox">AI
                        <input type="checkbox">Machine learning
                         <input type="checkbox">Robotics
                    </td>
                </tr>
                <tr>
                    <td>
                        <span class="label">photo</span>
                    </td>
                    <td>
                        <input type="file">
                    </td>
                
                </tr>
                <tr>
                    <td>
                        <input type="submit" value submit class="button">
                        <input type="reset" value="reset" class="button">
                    </td>
                </tr>
            </table>
        </form>

    </div>
    
</body>
</html>
