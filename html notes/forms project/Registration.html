<!DOCTYPE html>
<html lang="en">
    <head>
      <!-- <link rel="stylesheet" href="css/styling.css">-->
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width,initial-scale=1.0">
        <title>
            student registration form
        </title>
        
    </head>
    <body>
        <div class="main">
            <div clas="heading">
                <h1>student registration form</h1>
            </div>
            <form >
                <table>
                    <tr>
                        <td>
                            <span class="label">Name:</span>
                        </td>
                        <td>
                            <input type="text"placeholder="enter full name">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label">Mother's name</span>
                        </td>
                        <td>
                            <input type="text">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label">Phone number</span>
                        </td>
                        <td>
                           <input type="text"placeholder="07********">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label"> Email</span>
                        </td>
                        <td>
                            <input type="email" placeholder="">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label"> gender</span>
                        </td>
                        <td>
                            <input type="radio" name="gender" >male
                            <input type="radio" name="gender">female
                            <input type="radio" name="gender">other
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span clas="label"> date of birth</span>
                        </td>
                        <td>
                            <input type="text" class="dob">
                             <input type="text" class="dob">
                              <input type="text" class="dob">
                              (dd-mm-yyyy)
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label">Address</span>
                        </td>
                        <td>
                            <input type="text" placeholder="Street:-House:-Road">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label">Blood Group:</span>
                        </td>
                        <tr>
                            <td>
                            <select>
                                <option>select</option>
                                <option>A+</option>
                                <option>B+</option>
                                <option>AB+</option>
                                <option>O+</option>
                            </select>
                        </td>
                        </tr>
                    <tr>
                        <td>
                            <span class="label">Department</span>
                        </td>
                        <td>
                            <input type="radio" name="dept">CSE
                            <input type="radio" name="dept">EEE
                            <input type="radio" name="dept">BBA
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label">course</span>
                        </td>
                        <td>
                            <input type="checkbox">C
                             <input type="checkbox">C++
                             <input type="checkbox">HTML
                             <input type="checkbox">CSS
                             <input type="checkbox">AI
                             <input type="checkbox">Robotics
                             
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <span class="label">photo</span>
                        </td>
                        <td>
                        <input type="file">
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <input type="submit" value="submit" class="button">
                            <input type="Reset" class="button">
                        </td>
                    </tr>
                </table>
        </div>
    </body>

</html>
